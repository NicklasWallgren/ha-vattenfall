name: Publish

on:
  release:
    types:
      - published
  workflow_dispatch:

jobs:
  release:
    name: Publish zip file
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      INTEGRATION_PATH: ${{ github.workspace }}/custom_components/vattenfall
    steps:
      - name: Check out code
        uses: actions/checkout@v4.2.2

      - name: Set version in manifest.json
        run: |
          version="${GITHUB_REF#refs/tags/v}"
          echo "Setting version to ${version}"
          sed -i -E "s/\"version\": \"[^\"]+\"/\"version\": \"${version}\"/" ${INTEGRATION_PATH}/manifest.json

      - name: Zip
        run: |
          cd $INTEGRATION_PATH
          zip vattenfall.zip -r ./
          ls -l *.zip

      - name: Include zip in release
        uses: softprops/action-gh-release@v2.2.1
        with:
          files: ${{ env.INTEGRATION_PATH }}/vattenfall.zip
          fail_on_unmatched_files: true
